[urgency=critical]
default-timeout=0
layer=overlay

[mode=dnd]
invisible=true

[mode=dnd app-name=notify-send]
invisible=false

[summary~="Setup Wi-Fi"]
on-button-left=exec sh -c 'nirakase-notif-dismiss "Setup Wi-Fi"; nirakase-launch-wifi'

[summary~="Update System"]
on-button-left=exec sh -c 'niralase-notif-dismiss "Update System"; nirakase-launch-floating-terminal-with-presentation niarakas-update'
